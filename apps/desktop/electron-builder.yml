appId: com.opencodex.desktop
productName: OpenCodex
files:
  - dist/**/*
  - renderer/**/*
directories:
  output: release
  buildResources: build
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
