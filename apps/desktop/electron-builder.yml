appId: com.opencodex.desktop
productName: OpenCodex
files:
  - dist/**/*
  - ../app/dist/**/*
directories:
  output: release
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
